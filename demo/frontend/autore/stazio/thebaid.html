<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thebaid / Stazio</title>
    <meta name="description" content="Thebaid / Stazio" />
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../../static/styles.css?v=20260701a" />
  </head>
  <body class="help-popup-page">
    <main class="help-popup-shell">
      <div class="quick-jump-card-head" style="margin-bottom: 12px;">
        <p class="panel-kicker">Autore · Opera alias</p>
        <div class="ui-language-toggle" aria-label="Thebaid / Stazio language switch">
          <button type="button" class="ui-language-chip" data-lang-target="work-alias-stazio-thebaid" data-lang-value="en">EN</button>
          <button type="button" class="ui-language-chip" data-lang-target="work-alias-stazio-thebaid" data-lang-value="bilingual">中文</button>
        </div>
      </div>
      <div class="help-popup-head">
        <h1>Thebaid / Stazio</h1>
        <a class="ghost-link-button" id="work-alias-stazio-thebaid-back-link" href="../stazio.html">Back</a>
      </div>
      <div class="static-page-content" data-static-lang="en">
        
                      <p class="help-modal-lead">
                        This legacy work slug now redirects to the current canonical room for <strong>Thebais</strong>.
                      </p>
                      <div class="help-modal-body">
                        <section class="help-section">
                          <h3>Canonical Path</h3>
                          <p class="help-paragraph">
                            Continue to <a href="./thebais.html">Thebais</a>.
                          </p>
                        </section>
                      </div>
                    
      <script>
        window.addEventListener("DOMContentLoaded", function () {
          const next = new URL("./thebais.html", window.location.href);
          const params = new URLSearchParams(window.location.search);
          const lang = params.get("ui_lang");
          if (lang && !next.searchParams.has("ui_lang")) next.searchParams.set("ui_lang", lang);
          window.location.replace(next.pathname + next.search + next.hash);
        });
      </script>
    
      </div>
      <div class="static-page-content" data-static-lang="bilingual" hidden>
        
                      <p class="help-modal-lead">
                        这个旧作品 slug 现在会跳到 <strong>Thebais</strong> 的当前 canonical 房间。
                      </p>
                      <div class="help-modal-body">
                        <section class="help-section">
                          <h3>当前路径</h3>
                          <p class="help-paragraph">
                            继续前往 <a href="./thebais.html">Thebais</a>。
                          </p>
                        </section>
                      </div>
                    
      <script>
        window.addEventListener("DOMContentLoaded", function () {
          const next = new URL("./thebais.html", window.location.href);
          const params = new URLSearchParams(window.location.search);
          const lang = params.get("ui_lang");
          if (lang && !next.searchParams.has("ui_lang")) next.searchParams.set("ui_lang", lang);
          window.location.replace(next.pathname + next.search + next.hash);
        });
      </script>
    
      </div>
    </main>
    <script>
      (function () {
        function getLanguage() {
          try {
            window.localStorage.setItem("ddp-ui-language", "en");
          } catch (error) {
            return "en";
          }
          return "en";
        }
        function applyLanguage(language) {
          language = "en";
          document.documentElement.lang = "en";
          document.querySelectorAll('[data-lang-target="work-alias-stazio-thebaid"]').forEach((button) => {
            button.classList.toggle("is-active", button.dataset.langValue === language);
          });
          document.querySelectorAll("[data-static-lang]").forEach((block) => {
            block.hidden = block.dataset.staticLang !== language;
          });
          const url = new URL(window.location.href);
          url.searchParams.delete("ui_lang");
          window.history.replaceState({}, "", url);
          try {
            window.localStorage.setItem("ddp-ui-language", language);
          } catch (error) {
          }
          const back = document.getElementById("work-alias-stazio-thebaid-back-link");
          const backUrl = new URL(back.getAttribute("href"), window.location.href);
          backUrl.searchParams.delete("ui_lang");
          back.href = backUrl.pathname + backUrl.search;
        }
        const initial = getLanguage();
        applyLanguage(initial);
        document.querySelectorAll('[data-lang-target="work-alias-stazio-thebaid"]').forEach((button) => {
          button.addEventListener("click", () => applyLanguage(button.dataset.langValue === "bilingual" ? "bilingual" : "en"));
        });
      })();
    </script>
  </body>
    </html>
